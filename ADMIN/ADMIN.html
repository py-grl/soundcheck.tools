<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundcheck Permissions</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; min-height: 100vh; padding: 2rem 1.5rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #f0f0f0; }
    h2 { font-size: 18px; font-weight: 500; margin-bottom: 6px; color: #fff; }
    .sub { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #888; padding: 0 6px 12px; text-align: center; }
    thead th.name-col { text-align: left; padding-left: 4px; }
    tbody tr { border-top: 1px solid #222; }
    tbody tr:hover { background: #161616; }
    td { padding: 14px 6px; text-align: center; }
    td.name-cell { text-align: left; padding-left: 4px; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .user-name { font-size: 14px; font-weight: 500; color: #f0f0f0; }
    .user-role { font-size: 11px; color: #555; }
    .toggle { width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid #2a2a2a; background: #1a1a1a; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto; transition: background 0.15s, border-color 0.15s; }
    .toggle:hover { border-color: #444; }
    .toggle.on { background: #fff200; border-color: #fff200; }
    .app-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 7px; border-radius: 99px; background: #1e1e1e; color: #777; border: 1px solid #2a2a2a; }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #fff200; border-radius: 8px; padding: 10px 16px; font-size: 13px; color: #1a1a00; font-weight: 600; opacity: 0; transform: translateY(8px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .approve-btn { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 99px; border: 1.5px solid #f59e0b; background: transparent; color: #f59e0b; cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase; transition: background 0.15s, color 0.15s; white-space: nowrap; }
    .approve-btn:hover { background: #f59e0b; color: #1a1a00; }
    .approved-badge { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 99px; background: #14532d; color: #4ade80; letter-spacing: 0.04em; text-transform: uppercase; }
    .remove-btn { width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid #2a2a2a; background: #1a1a1a; color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto; transition: background 0.15s, border-color 0.15s, color 0.15s; }
    .remove-btn:hover { background: #3f0d0d; border-color: #ef4444; color: #ef4444; }
    .push-btn { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 99px; border: 1.5px solid #333; background: transparent; color: #444; cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase; transition: background 0.15s, color 0.15s, border-color 0.15s; white-space: nowrap; }
    .push-btn.dirty { border-color: #fff200; color: #fff200; }
    .push-btn.dirty:hover { background: #fff200; color: #1a1a00; }
    tbody tr.dirty { background: #1a1900; }
    tbody tr.dirty:hover { background: #222200; }
  </style>
</head>
<body>

  <h2>Permissions</h2>
  <p class="sub">Click a cell to toggle app access. Approve pending accounts before they can log in.</p>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="name-col">Name</th>
          <th><div class="app-badge">Status</div></th>
          <th><div class="app-badge">Noke</div></th>
          <th><div class="app-badge">Dock Scheduler</div></th>
          <th><div class="app-badge">Checkout</div></th>
          <th><div class="app-badge">Noke Messenger</div></th>
          <th><div class="app-badge">Parking</div></th>
          <th><div class="app-badge">Noke2Excel</div></th>
          <th><div class="app-badge">Admin</div></th>
          <th><div class="app-badge">Push</div></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const apps = ['Noke','Dock Scheduler','Checkout','Noke Messenger','Parking','Noke2Excel','Admin'];
    let users = [];

    const checkSVG = `<svg viewBox="0 0 14 14" width="14" height="14" fill="none" stroke="#1a1a00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 6,11 12,3"/></svg>`;

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    const trashSVG = `<svg viewBox="0 0 14 14" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,3 13,3"/><path d="M5,3V2h4v1"/><path d="M2,3l1,9h8l1-9"/><line x1="5.5" y1="6" x2="5.5" y2="10"/><line x1="8.5" y1="6" x2="8.5" y2="10"/></svg>`;

    async function approveUser(user, statusTd) {
      const res = await fetch(`/api/users/${user.id}/approve`, { method: 'PATCH' });
      if (res.ok) {
        user.approved = true;
        statusTd.innerHTML = `<span class="approved-badge">Approved</span>`;
        showToast(`${user.name} approved — they can now log in`);
      }
    }

    function renderTable() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';

      users.forEach(user => {
        const tr = document.createElement('tr');

        const nameTd = document.createElement('td');
        nameTd.className = 'name-cell';
        nameTd.innerHTML = `<div class="user-info">
          <div class="avatar" style="background:${user.color};color:${user.text};">${user.initials}</div>
          <div>
            <div class="user-name">${user.name}</div>
            <div class="user-role">${user.role}</div>
          </div>
        </div>`;
        tr.appendChild(nameTd);

        const statusTd = document.createElement('td');
        if (user.approved) {
          statusTd.innerHTML = `<span class="approved-badge">Approved</span>`;
        } else {
          const approveBtn = document.createElement('button');
          approveBtn.className = 'approve-btn';
          approveBtn.textContent = 'Pending — Approve';
          approveBtn.onclick = () => approveUser(user, statusTd);
          statusTd.appendChild(approveBtn);
        }
        tr.appendChild(statusTd);

        apps.forEach((app, ai) => {
          const td = document.createElement('td');
          const btn = document.createElement('div');
          btn.className = 'toggle' + (user.access[ai] ? ' on' : '');
          btn.innerHTML = user.access[ai] ? checkSVG : '';
          btn.onclick = () => {
            user.access[ai] = !user.access[ai];
            btn.classList.toggle('on', user.access[ai]);
            btn.innerHTML = user.access[ai] ? checkSVG : '';
            tr.classList.add('dirty');
            pushBtn.classList.add('dirty');
          };
          td.appendChild(btn);
          tr.appendChild(td);
        });

        const pushTd = document.createElement('td');
        const pushBtn = document.createElement('button');
        pushBtn.className = 'push-btn';
        pushBtn.textContent = 'Push';
        pushBtn.onclick = async () => {
          const res = await fetch(`/api/users/${user.id}/permissions`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ access: user.access })
          });
          if (res.ok) {
            tr.classList.remove('dirty');
            pushBtn.classList.remove('dirty');
            showToast(`${user.name}'s permissions saved`);
          }
        };
        pushTd.appendChild(pushBtn);
        tr.appendChild(pushTd);

        const removeTd = document.createElement('td');
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.innerHTML = trashSVG;
        removeBtn.title = `Remove ${user.name}`;
        removeBtn.onclick = async () => {
          if (!confirm(`Remove ${user.name}? They'll need to sign up again.`)) return;
          const res = await fetch(`/api/users/${user.id}`, { method: 'DELETE' });
          if (res.ok) {
            tr.remove();
            showToast(`${user.name} removed`);
          }
        };
        removeTd.appendChild(removeBtn);
        tr.appendChild(removeTd);
        tbody.appendChild(tr);
      });
    }

    async function init() {
      try {
        const res = await fetch('/api/users');
        if (res.status === 401) { window.location.href = '/login'; return; }
        if (!res.ok) { showError(`Server error ${res.status} — try refreshing.`); return; }
        users = await res.json();
        renderTable();
      } catch (e) {
        showError('Cannot reach the server. Make sure the Flask app is running.');
      }
    }

    function showError(msg) {
      document.getElementById('tbody').innerHTML = `<tr><td colspan="10" style="padding:2rem;color:#ef4444;font-size:13px;">${msg}</td></tr>`;
    }

    init();
  </script>
</body>
</html>
