<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundcheck Nashville â€” Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --y: #fff200;
    --blk: #0d0d0d;
    --blk2: #141414;
    --blk3: #1c1c1c;
    --grey: #252525;
    --txt: #f0f0f0;
    --txt2: #666;
    --radius: 12px;
  }

  body {
    background: var(--blk);
    color: var(--txt);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  .page { max-width: 860px; margin: 0 auto; padding: 0 28px 60px; }

  /* â”€â”€ header â”€â”€ */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 36px 0 48px;
    border-bottom: 1px solid #1e1e1e;
    margin-bottom: 48px;
  }

  .logo-area { display: flex; align-items: center; gap: 16px; }

  .logo-img {
    width: 58px; height: 58px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid #2a2a2a;
  }

  .logo-name {
    font-family: "Bebas Neue", sans-serif;
    font-size: 28px;
    letter-spacing: 0.08em;
    color: var(--y);
    line-height: 1;
  }

  .logo-sub {
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--txt2);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .header-domain {
    font-size: 11px;
    color: #333;
    letter-spacing: 0.06em;
    font-family: monospace;
  }

  .user-area { display: flex; align-items: center; gap: 12px; }
  .user-greeting { font-size: 12px; color: #555; letter-spacing: 0.04em; }
  .logout-btn {
    font-size: 10px; font-weight: 600; padding: 5px 12px;
    border-radius: 99px; border: 1.5px solid #2a2a2a;
    background: transparent; color: #555; cursor: pointer;
    letter-spacing: 0.06em; text-transform: uppercase;
    transition: border-color 0.15s, color 0.15s;
    font-family: inherit;
  }
  .logout-btn:hover { border-color: #ef4444; color: #ef4444; }

  /* â”€â”€ tools list â”€â”€ */
  .tools-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .tool-row {
    display: flex;
    align-items: center;
    background: var(--blk2);
    border: 1px solid #1e1e1e;
    border-radius: var(--radius);
    padding: 0 28px;
    height: 78px;
    cursor: default;
    text-decoration: none;
    outline: none;
    user-select: none;
    color: inherit;
    position: relative;
    overflow: hidden;
    transition: background 0.15s, border-color 0.15s;
    gap: 20px;
  }

  .tool-row::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--y);
    transform: scaleY(0);
    transform-origin: center;
    transition: transform 0.2s ease;
    border-radius: 0 2px 2px 0;
  }

  .tool-row:hover {
    background: var(--blk3);
    border-color: #2a2a2a;
  }

  .tool-row:hover::before { transform: scaleY(1); }
  .tool-row:hover .tool-arrow { transform: translate(3px, -3px); color: var(--y); }
  .tool-row:hover .tool-name { color: var(--y); }
  .tool-row:hover .tool-num { color: #333; }

  .tool-num {
    font-family: "Bebas Neue", sans-serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: #272727;
    width: 24px;
    flex-shrink: 0;
    transition: color 0.15s;
  }

  .tool-icon {
    font-size: 20px;
    width: 38px;
    height: 38px;
    background: var(--grey);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .tool-name {
    font-family: "Bebas Neue", sans-serif;
    font-size: 22px;
    letter-spacing: 0.06em;
    color: var(--txt);
    flex: 1;
    transition: color 0.15s;
  }

  .tool-url {
    font-size: 11px;
    color: #333;
    font-family: monospace;
    letter-spacing: 0.02em;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tool-url.set { color: #444; }

  .edit-btn {
    font-size: 10px;
    color: #444;
    background: none;
    border: 1px solid #252525;
    border-radius: 6px;
    padding: 4px 10px;
    cursor: default;
    font-family: inherit;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .edit-btn:hover { border-color: var(--y); color: var(--y); }

  .tool-arrow {
    font-size: 16px;
    color: #2a2a2a;
    transition: transform 0.18s ease, color 0.15s;
    flex-shrink: 0;
    margin-left: 4px;
  }

  /* â”€â”€ modal â”€â”€ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.18s;
    padding: 20px;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--blk2);
    border: 1px solid #252525;
    border-radius: var(--radius);
    padding: 32px;
    width: 100%; max-width: 420px;
    transform: translateY(10px);
    transition: transform 0.18s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: "Bebas Neue", sans-serif;
    font-size: 22px; letter-spacing: 0.06em;
    color: var(--y); margin-bottom: 4px;
  }
  .modal-sub { font-size: 12px; color: var(--txt2); margin-bottom: 22px; }

  .modal label {
    display: block; font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--txt2); margin-bottom: 7px;
  }

  .modal input {
    width: 100%; background: var(--blk3);
    border: 1px solid #252525; border-radius: 8px;
    padding: 10px 14px; font-size: 13px;
    color: var(--txt); font-family: monospace;
    margin-bottom: 20px; transition: border-color 0.15s;
  }
  .modal input:focus { outline: none; border-color: var(--y); }

  .modal-btns { display: flex; gap: 10px; }

  .btn-save {
    flex: 1; background: var(--y); color: #111;
    border: none; border-radius: 8px; padding: 10px;
    font-size: 13px; font-weight: 500; cursor: default;
    font-family: inherit; transition: background 0.15s;
  }
  .btn-save:hover { background: #e8db00; }

  .btn-cancel {
    background: none; border: 1px solid #252525;
    border-radius: 8px; padding: 10px 18px;
    font-size: 13px; color: var(--txt2);
    cursor: default; font-family: inherit;
    transition: border-color 0.15s;
  }
  .btn-cancel:hover { border-color: #555; }

  /* â”€â”€ footer â”€â”€ */
  footer {
    margin-top: 52px;
    padding-top: 20px;
    border-top: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-left { font-size: 11px; color: #2a2a2a; letter-spacing: 0.06em; }
  .rock-badge { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #2a2a2a; letter-spacing: 0.1em; text-transform: uppercase; }
  .rock-y { font-family: "Bebas Neue", sans-serif; font-size: 13px; color: var(--y); }

  /* â”€â”€ animations â”€â”€ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  header { animation: fadeUp 0.4s ease both; }
  .tool-row:nth-child(1) { animation: fadeUp 0.35s 0.08s ease both; }
  .tool-row:nth-child(2) { animation: fadeUp 0.35s 0.14s ease both; }
  .tool-row:nth-child(3) { animation: fadeUp 0.35s 0.20s ease both; }
  .tool-row:nth-child(4) { animation: fadeUp 0.35s 0.26s ease both; }
  .tool-row:nth-child(5) { animation: fadeUp 0.35s 0.32s ease both; }
  .tool-row:nth-child(6) { animation: fadeUp 0.35s 0.38s ease both; }
  .tool-row:nth-child(7) { animation: fadeUp 0.35s 0.44s ease both; }

  @media (max-width: 600px) {
    .page { padding: 0 16px 48px; }
    .tool-row { padding: 0 18px; height: 68px; gap: 14px; }
    .tool-url { display: none; }
    header { padding: 24px 0 36px; }
  }

  /* â”€â”€ login overlay â”€â”€ */
  .login-overlay {
    position: fixed; inset: 0; background: #0d0d0d; z-index: 999;
    display: flex; align-items: center; justify-content: center;
  }
  .login-overlay.hidden { display: none; }
  .login-overlay::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,242,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,242,0,0.03) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events: none;
  }
  .login-card {
    position: relative; z-index: 1; background: #151515;
    border: 1px solid #222; border-radius: 20px; padding: 2.5rem 2rem;
    width: 100%; max-width: 420px; animation: fadeUp 0.4s ease both;
  }
  .login-wordmark {
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.18em;
    color: var(--y); margin-bottom: 2rem;
  }
  .login-tab-row {
    display: flex; gap: 4px; background: #0d0d0d; border-radius: 10px;
    padding: 4px; margin-bottom: 2rem;
  }
  .login-tab {
    flex: 1; padding: 8px; border-radius: 7px; border: none;
    background: transparent; color: #555; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .login-tab.active { background: #151515; color: var(--txt); border: 1px solid #222; }
  .login-form { display: flex; flex-direction: column; gap: 14px; }
  .login-form.hidden { display: none; }
  .login-field { display: flex; flex-direction: column; gap: 6px; }
  .login-field label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #555; }
  .login-field input {
    background: #0d0d0d; border: 1px solid #222; border-radius: 10px;
    padding: 12px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    color: var(--txt); outline: none; transition: border-color 0.15s; width: 100%;
  }
  .login-field input:focus { border-color: var(--y); }
  .login-btn {
    margin-top: 6px; padding: 13px; border-radius: 10px; border: none;
    background: var(--y); color: #1a1a00; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-error {
    font-size: 12px; color: #ff4d4d; display: none; padding: 10px 12px;
    background: rgba(255,77,77,0.08); border-radius: 8px; border: 1px solid rgba(255,77,77,0.2);
  }
  .login-error.show { display: block; }
  .login-footer { margin-top: 1.5rem; font-size: 11px; color: #333; text-align: center; line-height: 1.6; }
</style>
</head>
<body>

<!-- login overlay â€” shown by default, hidden after auth -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <div class="login-wordmark">Soundcheck.tools</div>
    <div class="login-tab-row">
      <button class="login-tab active" onclick="switchLoginTab('login')">Log in</button>
      <button class="login-tab" id="tab-signup" onclick="switchLoginTab('signup')">Sign up</button>
    </div>
    <form class="login-form" id="form-login" onsubmit="handleLogin(event)">
      <div class="login-error" id="login-error"></div>
      <div class="login-field"><label>Email</label><input type="email" id="login-email" placeholder="you@clairglobal.com" required /></div>
      <div class="login-field"><label>Password</label><input type="password" id="login-password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required /></div>
      <button type="submit" class="login-btn">Log in</button>
    </form>
    <form class="login-form hidden" id="form-signup" onsubmit="handleSignup(event)">
      <div class="login-error" id="signup-error"></div>
      <div class="login-field"><label>Full name</label><input type="text" id="signup-name" placeholder="Your name" required /></div>
      <div class="login-field"><label>Email</label><input type="email" id="signup-email" placeholder="you@soundcheck.tools" required /></div>
      <div class="login-field"><label>Password</label><input type="password" id="signup-password" placeholder="Min. 8 characters" required minlength="8" /></div>
      <div class="login-field"><label>Confirm password</label><input type="password" id="signup-confirm" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required /></div>
      <button type="submit" class="login-btn">Create account</button>
    </form>
    <p class="login-footer">Access is granted by your administrator.<br>Contact your manager if you need help.</p>
  </div>
</div>

  { id: 'noke2excel', name: 'Noke2Excel',      icon: 'ðŸ“Š', url: 'https://clairglobal-my.sharepoint.com/:f:/p/jherrman/IgAzQhX5gjalQayhuxJJv8suAQDFL4ajun7Nkfj7E0YL7Ds?e=fgduLa', accessIndex: 5 },
  { id: 'admin',      name: 'Admin',           icon: 'âš™ï¸', url: '/admin', accessIndex: 6, adminOnly: true }
];

function openTool(id) {
  const tool = TOOLS.find(t => t.id === id);
  if (!tool || !tool.url) return;
  if (tool.id === 'admin') { window.location.href = tool.url; } else { window.open(tool.url, '_blank'); }
}

function setUser(name) {
  document.getElementById('user-greeting').textContent = name || '';
  document.getElementById('logout-btn').style.display = name ? '' : 'none';
}

async function logout() {
  await fetch('/auth/logout', { method: 'POST' });
  setUser(null);
  document.getElementById('login-overlay').classList.remove('hidden');
}

function render(isAdmin, access) {
  const visible = TOOLS.filter(t => access && access[t.accessIndex]);
  document.getElementById('tools-list').innerHTML = visible.map((t, i) => {
    const clickable = t.url ? `onclick="openTool('${t.id}')" role="button" tabindex="0" onkeydown="if(event.key==='Enter')openTool('${t.id}')"` : '';
    return `<div class="tool-row" ${clickable}>
      <div class="tool-num">0${i+1}</div>
      <div class="tool-icon">${t.icon}</div>
      <div class="tool-name">${t.name}</div>
      <div class="tool-url ${t.url ? 'set' : ''}">${t.id === 'admin' ? 'soundcheck.tools/admin' : (t.url || 'Coming soon')}</div>
      <div class="tool-arrow">&#8599;</div>
    </div>`;
  }).join('');
}

function switchLoginTab(tab) {
  document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('form-signup').classList.toggle('hidden', tab !== 'signup');
  document.querySelectorAll('.login-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('login-error').classList.remove('show');
  document.getElementById('signup-error').classList.remove('show');
}

async function handleLogin(e) {
  e.preventDefault();
  const err = document.getElementById('login-error');
  err.classList.remove('show');
  try {
    const res = await fetch('/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Login failed.'; err.classList.add('show'); return; }
    document.getElementById('login-overlay').classList.add('hidden');
    setUser(data.name);
    render(data.role === 'admin', data.access);
  } catch (e) {
    err.textContent = 'Could not reach server.'; err.classList.add('show');
  }
}

async function handleSignup(e) {
  e.preventDefault();
  const pw = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;
  const err = document.getElementById('signup-error');
  if (pw !== confirm) { err.textContent = 'Passwords do not match.'; err.classList.add('show'); return; }
  err.classList.remove('show');
  try {
    const res = await fetch('/auth/signup', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: document.getElementById('signup-name').value, email: document.getElementById('signup-email').value, password: pw })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Signup failed.'; err.classList.add('show'); return; }
    err.style.color = '#4ade80'; err.textContent = data.message; err.classList.add('show');
    document.getElementById('form-signup').querySelector('.login-btn').disabled = true;
  } catch (e) {
    err.textContent = 'Could not reach server.'; err.classList.add('show');
  }
}

async function init() {
  try {
    const res = await fetch('/api/me');
    if (!res.ok) return; // stay on login overlay
    const me = await res.json();
    document.getElementById('login-overlay').classList.add('hidden');
    setUser(me.name);
    render(me.role === 'admin', me.access);
  } catch (e) {
    // stay on login overlay â€” server not reachable
  }
}

init();
</script>
