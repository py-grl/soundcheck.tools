server {
    listen 80;
    server_name soundcheck.tools www.soundcheck.tools;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name soundcheck.tools www.soundcheck.tools;

    ssl_certificate     /etc/letsencrypt/live/soundcheck.tools/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soundcheck.tools/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ── Dock Scheduler (Flask/gunicorn on port 5001) ──────────────────────────
    location /dockscheduler {
        rewrite ^/dockscheduler(/.*)?$ /$1 break;
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Prefix /dockscheduler;
    }

    # ── Sound Parking (Node/Express on port 3000) ─────────────────────────────
    location /parking {
        rewrite ^/parking(/.*)?$ /$1 break;
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
